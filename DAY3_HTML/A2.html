<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Level - 3</title>
</head>
<body>
    <form action="Login a web site">
        <div>
            <lebel for="name">Name : </lebel>
            <input type="text" id="name" name="name">
        </div>
        <div>
            Sex:
            <input type="radio" id="male" name="gender" value="male">
            <lebel for="gender">Male</lebel>
            <input type="radio" id="female" name="gender" value="female">
            <lebel for="gender">Female</lebel>
        </div>
        <div>
            <lebel for="Country">Country:</lebel>
            <select name="Country" id="Country" placeholder="Selet an option">
                <option value="ban">Bangladesh</option>
                <option value="pak">Pakistan</option>
                <option value="rus">Russia</option>
                <option value="Chi">China</option>
                <option value="Iran">Iran</option>
            </select>
        </div> 
        <footer>
            <div>
                <lebel for="feedback">Message:</lebel><br>
                <textarea id="feedback" name="feedback"></textarea>
            </div>
            <input type="checkbox" id="sub">
            <lebel for="sub">Subscribe?</lebel><br>
            <button>Submit</button>
        </footer>    
    </form>
</body>
</html>
