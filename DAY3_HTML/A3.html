<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Level - 3</title>
</head>
<body>
    <form>
        <h1>Feedback Form</h1> 
        <div>
            <lebel for="Name"><b>Name: </b></lebel>
            <input type="text" id="Name" placeholder="Write your name">
            <br><br>
            <lebel for="Email"><B>Email: </B></lebel>
            <input type="text" id="Email" placeholder="Write your email">
        </div>
        <div>
            <lebel for="message"><b>Message: </b></lebel><br>
            <textarea id="message" cols="24" rows="4" ></textarea>
        </div>
        <div>
            <lebel for="feedback"><b>Rate us our of 5: </b></lebel><br>
            <input type="radio" id="feedback" name="feedback">
            <lebel for="feedback"> 1</lebel><br>
            <input type="radio" id="feedback" name="feedback">
            <lebel for="feedback"> 2</lebel><br>
            <input type="radio" id="feedback" name="feedback">
            <lebel for="feedback"> 3</lebel><br>
            <input type="radio" id="feedback" name="feedback">
            <lebel for="feedback"> 4</lebel><br>
            <input type="radio" id="feedback" name="feedback">
            <lebel for="feedback"> 5</lebel><br>
        </div>
        <div>
            <button>Send you message!</button>
        </div>
   </form>
</body>
</html>
